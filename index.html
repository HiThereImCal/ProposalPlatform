document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f56ab485-2025-4e7a-b04b-2bf9c47b0cda\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"c6669228-5ccc-4e61-ba58-f7a8ee7f6366\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Lato';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"eb6186e4-a1ac-4b11-a249-637688263e4e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    /* ──────────────────────────────────────────────────────────────\n       Tokens — Queen's University Belfast theme.\n       Brand red, navy, white. Sans-serif throughout (Lato).\n       ────────────────────────────────────────────────────────────── */\n    :root {\n      /* Surfaces */\n      --c-bg:       #F4F4F2;   /* off-white page bg */\n      --c-bg-2:     #ECECE9;   /* slightly darker fill */\n      --c-bg-3:     #DCDCD8;   /* alt surface */\n      --c-paper:    #FFFFFF;   /* white card */\n\n      /* Ink */\n      --c-ink:      #1B1F2A;   /* near-black body */\n      --c-ink-soft: #5A6173;   /* secondary text */\n      --c-rule:     rgba(27, 31, 42, 0.16);\n\n      /* QUB brand */\n      --c-qub-red:  #A8001A;   /* Queen's red */\n      --c-qub-red-dk: #7E0014; /* darker red for hover/depth */\n      --c-qub-navy: #0D1D3D;   /* QUB navy (secondary brand) */\n\n      /* Data viz */\n      --c-terra:    #A8001A;   /* phasic = brand red */\n      --c-blue:     #1F3F7E;   /* tonic = navy */\n      --c-sage:     #2F6B4E;\n      --c-ochre:    #B8841A;\n      --c-plum:     #5C2D5A;\n      --c-burgundy: #7E0014;\n\n      --c-1:        #1F3F7E;\n      --c-2:        #A8001A;\n      --c-3:        #2F6B4E;\n      --c-4:        #B8841A;\n      --c-5:        #5C2D5A;\n\n      /* Type — sans throughout */\n      --f-display:  'Lato', ui-sans-serif, system-ui, sans-serif;\n      --f-body:     'Lato', ui-sans-serif, system-ui, sans-serif;\n      --f-mono:     'JetBrains Mono', ui-monospace, monospace;\n\n      --r-sm: 3px;\n      --r-md: 6px;\n      --r-lg: 10px;\n\n      --pad: 32px;\n      --gap: 24px;\n    }\n    [data-density=\"cozy\"]    { --pad: 44px; --gap: 32px; }\n    [data-density=\"compact\"] { --pad: 20px; --gap: 16px; }\n\n    *, *::before, *::after { box-sizing: border-box; }\n    html, body { margin: 0; padding: 0; }\n    html { background: var(--c-bg); }\n    body {\n      font-family: var(--f-body);\n      color: var(--c-ink);\n      font-size: 16px;\n      line-height: 1.55;\n      font-weight: 400;\n      -webkit-font-smoothing: antialiased;\n      min-height: 100vh;\n    }\n    em { font-style: italic; font-family: var(--f-body); font-weight: 400; }\n    button { font-family: inherit; }\n    a { color: var(--c-qub-red); }\n\n    .app { min-height: 100vh; }\n\n    /* ──────────────────────────────────────────────────────────────\n       TOP BAR (shared across sub-pages)\n       ────────────────────────────────────────────────────────────── */\n    .topbar {\n      position: sticky; top: 0; z-index: 50;\n      display: flex; align-items: center; gap: 22px;\n      padding: 14px 32px;\n      background: rgba(239, 230, 211, 0.85);\n      backdrop-filter: blur(10px);\n      -webkit-backdrop-filter: blur(10px);\n      border-bottom: 1px solid var(--c-rule);\n    }\n    .topbar-back {\n      appearance: none; border: 1px solid var(--c-rule);\n      background: transparent; color: var(--c-ink);\n      font: 500 13px/1 var(--f-body); cursor: pointer;\n      padding: 9px 14px 9px 11px; border-radius: 999px;\n      display: inline-flex; align-items: center; gap: 6px;\n      letter-spacing: 0.01em;\n      transition: background .15s, border-color .15s;\n    }\n    .topbar-back:hover {\n      background: var(--c-paper);\n      border-color: var(--c-ink);\n    }\n    .topbar-crumb {\n      font: 500 11px/1 var(--f-mono);\n      letter-spacing: 0.16em; text-transform: uppercase;\n      color: var(--c-ink-soft);\n    }\n    .topbar-spacer { flex: 1; }\n\n    /* Advanced mode toggle */\n    .adv-toggle {\n      display: inline-flex; align-items: center; gap: 10px;\n      padding: 6px 10px 6px 14px;\n      border-radius: 999px;\n      border: 1px solid var(--c-rule);\n      cursor: pointer;\n      transition: background .15s, border-color .15s;\n    }\n    .adv-toggle:hover { background: var(--c-paper); border-color: var(--c-ink); }\n    .adv-toggle.on { background: var(--c-ink); color: var(--c-paper); border-color: var(--c-ink); }\n    .adv-toggle-l { display: flex; flex-direction: column; gap: 2px; }\n    .adv-toggle-eyebrow {\n      font: 500 9px/1 var(--f-mono);\n      letter-spacing: 0.14em; text-transform: uppercase;\n      opacity: 0.6;\n    }\n    .adv-toggle-state {\n      font: 600 13px/1 var(--f-body);\n      letter-spacing: 0.01em;\n    }\n    .adv-toggle-track {\n      width: 32px; height: 18px; border-radius: 999px;\n      background: var(--c-bg-3); position: relative;\n      transition: background .2s;\n      flex-shrink: 0;\n    }\n    .adv-toggle.on .adv-toggle-track { background: var(--c-ochre); }\n    .adv-toggle-thumb {\n      position: absolute; top: 2px; left: 2px;\n      width: 14px; height: 14px; border-radius: 50%;\n      background: var(--c-paper);\n      transition: transform .2s;\n    }\n    .adv-toggle.on .adv-toggle-thumb { transform: translateX(14px); }\n\n    /* ──────────────────────────────────────────────────────────────\n       PROPOSAL DOCUMENT (.doc-*)\n       Single-scroll Study 3 proposal. Cover · §1–§6 · references.\n       ────────────────────────────────────────────────────────────── */\n    .doc-root {\n      min-height: 100vh;\n      padding-bottom: 96px;\n    }\n\n    /* Document top strip — QUB red institutional bar */\n    .doc-topbar {\n      position: sticky; top: 0; z-index: 50;\n      display: flex; align-items: center; justify-content: space-between;\n      gap: 22px;\n      padding: 0 36px;\n      height: 56px;\n      background: var(--c-qub-red);\n      border-bottom: 3px solid var(--c-qub-red-dk);\n      color: #FFFFFF;\n    }\n    .doc-topbar-l {\n      display: flex; align-items: center; gap: 14px;\n      color: #FFFFFF;\n    }\n    .doc-topbar-wordmark {\n      font: 900 14px/1 var(--f-body);\n      letter-spacing: 0.04em;\n      text-transform: uppercase;\n      color: #FFFFFF;\n    }\n    .doc-topbar-divider {\n      font-size: 14px;\n      opacity: 0.6;\n      color: #FFFFFF;\n    }\n    .doc-topbar-school {\n      font: 500 12px/1 var(--f-body);\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n      color: #FFFFFF;\n      opacity: 0.9;\n    }\n\n    /* Advanced toggle restyled for red bar */\n    .doc-topbar .adv-toggle {\n      border-color: rgba(255, 255, 255, 0.35);\n      color: #FFFFFF;\n    }\n    .doc-topbar .adv-toggle:hover {\n      background: rgba(255, 255, 255, 0.1);\n      border-color: rgba(255, 255, 255, 0.6);\n    }\n    .doc-topbar .adv-toggle.on {\n      background: #FFFFFF;\n      color: var(--c-qub-red);\n      border-color: #FFFFFF;\n    }\n    .doc-topbar .adv-toggle-track { background: rgba(255, 255, 255, 0.3); }\n    .doc-topbar .adv-toggle.on .adv-toggle-track { background: var(--c-qub-red); }\n    .doc-topbar .adv-toggle-thumb { background: #FFFFFF; }\n\n    /* Light / dark mode toggle (replaces Detail) */\n    .theme-toggle {\n      appearance: none;\n      display: inline-flex; align-items: center; gap: 8px;\n      padding: 7px 14px 7px 11px;\n      border: 1px solid rgba(255, 255, 255, 0.4);\n      border-radius: 999px;\n      background: transparent;\n      color: #FFFFFF;\n      font: 700 11px/1 var(--f-body);\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      cursor: pointer;\n      transition: background .15s, border-color .15s, color .15s;\n    }\n    .theme-toggle:hover {\n      background: #FFFFFF;\n      color: var(--c-qub-red);\n      border-color: #FFFFFF;\n    }\n    .theme-toggle svg { display: block; flex-shrink: 0; }\n    .theme-toggle-label { line-height: 1; }\n\n    /* ──────────────────────────────────────────────────────────\n       Dark mode overrides\n       ────────────────────────────────────────────────────────── */\n    [data-theme=\"dark\"] {\n      --c-bg:       #0A1228;\n      --c-bg-2:     #0F1A38;\n      --c-bg-3:     #15234A;\n      --c-paper:    #142348;\n      --c-ink:      #F0F2F8;\n      --c-ink-soft: #8B95B0;\n      --c-rule:     rgba(255, 255, 255, 0.14);\n      --c-qub-red:  #D62A45;\n      --c-qub-red-dk: #A8001A;\n      --c-qub-navy: #F0F2F8;    /* in dark, \"navy\" headings become light */\n      --c-terra:    #D62A45;\n      --c-blue:     #7BA0E0;\n    }\n    [data-theme=\"dark\"] .doc-cover-title em { color: var(--c-ink-soft); }\n    [data-theme=\"dark\"] .doc-pull-warn { background: rgba(214, 42, 69, 0.14); }\n    [data-theme=\"dark\"] .doc-cond-code { background: var(--c-bg-3); color: var(--c-ink); }\n    [data-theme=\"dark\"] .doc-construct-row-l { background: var(--c-bg-2); }\n    [data-theme=\"dark\"] .doc-construct-h { background: var(--c-bg-2); }\n    [data-theme=\"dark\"] .doc-construct-h-col,\n    [data-theme=\"dark\"] .doc-construct-row > div + div { border-left-color: var(--c-rule); }\n    [data-theme=\"dark\"] .doc-cond-sig,\n    [data-theme=\"dark\"] .doc-reg-drives,\n    [data-theme=\"dark\"] .doc-demo-cap { color: var(--c-ink-soft); }\n    [data-theme=\"dark\"] .doc-adv-note {\n      background: var(--c-bg-2);\n      border-left-color: var(--c-ochre);\n    }\n    [data-theme=\"dark\"] .doc-diag-problem {\n      background: rgba(214, 42, 69, 0.10);\n    }\n    [data-theme=\"dark\"] .doc-diag-fix {\n      background: rgba(123, 160, 224, 0.10);\n    }\n    [data-theme=\"dark\"] .doc-rules li::before { background: var(--c-qub-red); }\n    [data-theme=\"dark\"] body { color: var(--c-ink); }\n    [data-theme=\"dark\"] html { background: var(--c-bg); }\n\n    /* Document container — narrow column for body, wider for blocks */\n    .doc {\n      max-width: 920px;\n      margin: 0 auto;\n      padding: 56px 40px 0;\n    }\n    [data-density=\"compact\"] .doc { padding: 36px 24px 0; }\n    [data-density=\"cozy\"]    .doc { padding: 80px 64px 0; }\n\n    /* ── COVER ────────────────────────────────────────────── */\n    .doc-cover { padding-bottom: 48px; border-bottom: 1px solid var(--c-ink); }\n    .doc-cover-eyebrow {\n      font: 700 11px/1 var(--f-body);\n      letter-spacing: 0.22em; text-transform: uppercase;\n      color: var(--c-qub-red);\n      margin-bottom: 22px;\n      padding-left: 14px;\n      border-left: 4px solid var(--c-qub-red);\n    }\n    .doc-cover-title {\n      font: 900 clamp(36px, 4.4vw, 56px)/1.08 var(--f-display);\n      letter-spacing: -0.02em;\n      margin: 0 0 28px;\n      padding-bottom: 4px;\n      text-wrap: balance;\n      color: var(--c-qub-navy);\n      text-transform: none;\n    }\n    .doc-cover-title em {\n      font-style: italic;\n      font-weight: 400;\n      color: var(--c-ink-soft);\n      font-size: 0.86em;\n      letter-spacing: -0.005em;\n    }\n    .doc-cover-byline {\n      display: flex; gap: 36px; flex-wrap: wrap;\n      padding: 14px 0 \n      letter-spacing: 0.18em;\n      color: var(--c-ink-soft);\n    }\n\n    .doc-body {\n      max-width: 680px;\n      font-size: 15.5px; line-height: 1.7;\n      color: var(--c-ink);\n    }\n    .doc-body p { margin: 0 0 14px; }\n    .doc-body p:last-child { margin-bottom: 0; }\n    .doc-body strong { font-weight: 600; }\n    .doc-body em {\n      font: italic 15.5px/1.7 var(--f-display);\n      color: var(--c-ink);\n    }\n\n    /* Pull-quote callout — used for the prominent construct distinction\n       in § 2 and the trigger diagnosis statement in § 3. */\n    .doc-pull {\n      margin: 22px 0;\n      padding: 22px 28px;\n      border-left: 4px solid var(--c-qub-navy);\n      background: var(--c-paper);\n      border-radius: 0 var(--r-md) var(--r-md) 0;\n      box-shadow: 0 1px 0 var(--c-rule);\n      max-width: 760px;\n    }\n    .doc-pull p {\n      margin: 0 0 12px;\n      font: 600 20px/1.4 var(--f-display);\n      letter-spacing: -0.005em;\n      color: var(--c-qub-navy);\n      text-wrap: balance;\n    }\n    .doc-pull p:last-child { margin-bottom: 0; }\n    .doc-pull em {\n      font-style: italic;\n      color: var(--c-terra);\n    }\n    .doc-pull strong {\n      font-family: var(--f-body);\n      font-weight: 600;\n      font-size: 18px;\n      letter-spacing: 0;\n    }\n    .doc-pull-warn {\n      border-left-color: var(--c-qub-red);\n      background: #FFF5F6;\n    }\n    .doc-pull-warn p { color: var(--c-qub-navy); }\n    .doc-pull-warn em { color: var(--c-qub-red); font-style: italic; font-weight: 700; }\n    .doc-pull-warn strong { color: var(--c-qub-red); }\n    .doc-rules {\n      list-style: none; padding: 0;\n      margin: 14px 0 0;\n      font-size: 14.5px; line-height: 1.6;\n    }\n    .doc-rules li {\n      padding: 8px 0 8px 28px;\n      border-bottom: 1px dashed var(--c-rule);\n      position: relative;\n    }\n    .doc-rules li:last-child { border-bottom: 0; }\n    .doc-rules li::before {\n      content: '';\n      position: absolute; left: 6px; top: 16px;\n      width: 6px; height: 6px;\n      background: var(--c-terra);\n      border-radius: 50%;\n    }\n    .doc-rules strong {\n      font-weight: 600;\n      color: var(--c-ink);\n    }\n\n    .doc-adv-note {\n      margin-top: 18px;\n      padding: 14px 18px;\n      background: var(--c-paper);\n      border-left: 2px solid var(--c-ochre);\n      border-radius: 0 var(--r-md) var(--r-md) 0;\n      font-size: 13.5px; line-height: 1.6;\n      color: var(--c-ink-soft);\n    }\n    .doc-adv-tag {\n      display: block;\n      font: italic 13px/1 var(--f-display);\n      color: var(--c-ochre);\n      margin-bottom: 4px;\n    }\n\n    /* ── DEMO: stacked traces ─────────────────────────────── */\n    .doc-demo {\n      margin: 24px 0 8px;\n      background: var(--c-paper);\n      border: 1px solid var(--c-rule);\n      border-radius: var(--r-md);\n      padding: 16px 22px 18px;\n    }\n    .doc-demo-h {\n      display: flex; align-items: center; gap: 14px;\n      padding-bottom: 10px;\n      border-bottom: 1px solid var(--c-rule);\n      margin-bottom: 14px;\n      flex-wrap: wrap;\n    }\n    .doc-demo-label {\n      font: 600 10px/1 var(--f-mono);\n      letter-spacing: 0.18em; text-transform: uppercase;\n      color: var(--c-ink);\n    }\n    .doc-demo-meta {\n      font: 500 11px/1 var(--f-mono);\n      color: var(--c-ink-soft);\n      flex: 1;\n    }\n    .doc-demo-reroll {\n      appearance: none; background: transparent;\n      border: 1px solid var(--c-rule); color: var(--c-ink-soft);\n      font: 500 11px/1 var(--f-mono);\n      letter-spacing: 0.06em;\n      padding: 6px 10px; border-radius: 999px;\n      cursor: pointer;\n    }\n    .doc-demo-reroll:hover {\n      border-color: var(--c-ink); color: var(--c-ink);\n    }\n    .doc-demo-traces {\n      display: flex; flex-direction: column;\n    }\n    .doc-demo-trace {\n      padding: 8px 0;\n    }\n    .doc-demo-trace + .doc-demo-trace {\n      border-top: 1px dashed var(--c-rule);\n    }\n    .doc-demo-trace-tag {\n      display: flex; align-items: center; gap: 8px;\n      font: 600 10.5px/1 var(--f-mono);\n      letter-spacing: 0.12em; text-transform: uppercase;\n      color: var(--c-ink);\n      margin-bottom: 4px;\n    }\n    .doc-demo-trace-unit {\n      margin-left: 8px;\n      font: 500 9.5px/1 var(--f-mono);\n      letter-spacing: 0.1em;\n      color: var(--c-ink-soft);\n      text-transform: none;\n    }\n    .doc-trace-dot {\n      width: 8px; height: 8px; border-radius: 50%;\n      display: inline-block;\n    }\n    .doc-demo-trace-body { position: relative; }\n    .doc-events { position: absolute; inset: 0; pointer-events: none; }\n    .doc-evmark {\n      position: absolute; top: 0; bottom: 0;\n      width: 1px; background: var(--c-ink-soft); opacity: 0.4;\n    }\n    .doc-evmark::before {\n      content: ''; position: absolute; top: 0; left: -2px;\n      width: 5px; height: 5px;\n      background: var(--c-ink); border-radius: 50%;\n    }\n    .doc-evlbl {\n      position: absolute; top: -14px; left: 4px;\n      font: 500 8.5px/1 var(--f-mono);\n      letter-spacing: 0.04em;\n      color: var(--c-ink-soft);\n      white-space: nowrap;\n    }\n    .doc-peaks {\n      position: absolute; inset: 0;\n      width: 100%; height: 100%;\n      pointer-events: none; overflow: visible;\n    }\n    .doc-demo-cap {\n      margin-top: 12px;\n      padding-top: 12px;\n      border-top: 1px solid var(--c-rule);\n      font: italic 13px/1.55 var(--f-display);\n      color: var(--c-ink-soft);\n      max-width: 760px;\n    }\n    .doc-demo-cap strong {\n      font-family: var(--f-mono); font-style: normal;\n      font-size: 11px; letter-spacing: 0.08em;\n      color: var(--c-ink);\n    }\n\n    /* ── CONSTRUCT TABLE ──────────────────────────────────── */\n    .doc-construct {\n      margin: 24px 0 14px;\n      border-top: 1px solid var(--c-ink);\n      border-bottom: 1px solid var(--c-ink);\n    }\n    .doc-construct-h {\n      display: grid;\n      grid-template-columns: 160px 1fr 1fr;\n      background: var(--c-bg);\n      border-bottom: 1px solid var(--c-ink);\n    }\n    .doc-construct-h > span {\n      padding: 12px 16px;\n      font: 600 11px/1 var(--f-mono);\n      letter-spacing: 0.14em; text-transform: uppercase;\n      color: var(--c-ink);\n      display: flex; align-items: center; gap: 8px;\n    }\n    .doc-construct-h-col + .doc-construct-h-col,\n    .doc-construct-h-col {\n      border-left: 1px solid var(--c-rule);\n    }\n    .doc-construct-h-row { background: transparent; }\n    .doc-construct-row {\n      display: grid;\n      grid-template-columns: 160px 1fr 1fr;\n      border-bottom: 1px solid var(--c-rule);\n    }\n    .doc-construct-row:last-child { border-bottom: 0; }\n    .doc-construct-row > div {\n      padding: 14px 16px;\n      font-size: 14px; line-height: 1.55;\n      color: var(--c-ink);\n    }\n    .doc-construct-row > div + div { border-left: 1px solid var(--c-rule); }\n    .doc-construct-row-l {\n      background: var(--c-bg);\n      font: 600 10px/1.3 var(--f-mono);\n      letter-spacing: 0.12em; text-transform: uppercase;\n      color: var(--c-ink-soft);\n      display: flex; align-items: center;\n    }\n    .doc-construct-row-l em {\n      font: italic 11px/1.3 var(--f-display);\n      color: var(--c-terra); letter-spacing: 0.02em;\n      text-transform: none;\n      margin: 0 2px;\n    }\n    @media (max-width: 760px) {\n      .doc-construct-h,\n      .doc-construct-row { grid-template-columns: 1fr; }\n      .doc-construct-row > div + div,\n      .doc-construct-h-col + .doc-construct-h-col,\n      .doc-construct-h-col { border-left: 0; }\n      .doc-construct-row > div { border-top: 1px solid var(--c-rule); }\n      .doc-construct-row > div:first-child { border-top: 0; }\n    }\n\n    /* ── DIAGNOSIS ────────────────────────────────────────── */\n    .doc-diag {\n      display: grid;\n      grid-template-columns: 1fr 32px 1fr;\n      gap: 0;\n      margin: 8px 0 4px;\n      align-items: stretch;\n    }\n    @media (max-width: 820px) {\n      .doc-diag { grid-template-columns: 1fr; gap: 14px; }\n      .doc-diag-arrow { transform: rotate(90deg); padding: 4px 0; }\n    }\n    .doc-diag-cell {\n      padding: 22px 24px;\n      border-radius: var(--r-md);\n      display: flex; flex-direction: column; gap: 10px;\n    }\n    .doc-diag-problem {\n      background: rgba(176, 85, 68, 0.07);\n      border-left: 3px solid var(--c-terra);\n    }\n    .doc-diag-fix {\n      background: rgba(62, 95, 142, 0.07);\n      border-left: 3px solid var(--c-blue);\n    }\n    .doc-diag-tag {\n      font: 600 10px/1 var(--f-mono);\n      letter-spacing: 0.18em; text-transform: uppercase;\n    }\n    .doc-diag-problem .doc-diag-tag { color: var(--c-terra); }\n    .doc-diag-fix     .doc-diag-tag { color: var(--c-blue); }\n    .doc-diag-h {\n      font: 700 19px/1.3 var(--f-body);\n      letter-spacing: -0.005em;\n      margin: 2px 0 4px;\n      color: var(--c-qub-navy);\n      text-wrap: balance;\n    }\n    .doc-diag-cell p {\n      margin: 0;\n      font-size: 14px; line-height: 1.6;\n      color: var(--c-ink);\n    }\n    .doc-diag-arrow {\n      display: flex; align-items: center; justify-content: center;\n      font: 400 22px/1 var(--f-display);\n      color: var(--c-ink-soft);\n    }\n\n    /* ── REGISTERS ────────────────────────────────────────── */\n    .doc-registers {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 18px;\n      margin: 14px 0 0;\n    }\n    @media (max-width: 760px) {\n      .doc-registers { grid-template-columns: 1fr; }\n    }\n    .doc-register {\n      padding: 20px 22px;\n      background: var(--c-paper);\n      border-radius: var(--r-md);\n      border-left: 3px solid var(--c-rule);\n      display: flex; flex-direction: column; gap: 10px;\n    }\n    .doc-register-tonic  { border-left-color: var(--c-blue); }\n    .doc-register-phasic { border-left-color: var(--c-terra); }\n    .doc-reg-h {\n      display: flex; align-items: center; gap: 8px;\n      padding-bottom: 8px;\n      border-bottom: 1px solid var(--c-rule);\n    }\n    .doc-reg-swatch {\n      width: 10px; height: 10px; border-radius: 50%;\n      display: inline-block;\n    }\n    .doc-reg-name {\n      font: 600 14px/1 var(--f-body);\n      color: var(--c-ink);\n    }\n    .doc-reg-tag {\n      margin-left: auto;\n      font: 500 10px/1 var(--f-mono);\n      letter-spacing: 0.12em; text-transform: uppercase;\n      color: var(--c-ink-soft);\n    }\n    .doc-reg-construct {\n      margin: 4px 0 0;\n      font: italic 16px/1.4 var(--f-display);\n      color: var(--c-ink-soft);\n    }\n    .doc-reg-construct strong {\n      font-style: normal;\n      font-family: var(--f-body);\n      font-weight: 600;\n      color: var(--c-ink);\n    }\n    .doc-reg-body {\n      margin: 0;\n      font-size: 13.5px; line-height: 1.6;\n      color: var(--c-ink);\n    }\n    .doc-reg-drives {\n      margin-top: 4px;\n      padding-top: 10px;\n      border-top: 1px dashed var(--c-rule);\n      font: 500 12px/1.5 var(--f-mono);\n      color: var(--c-ink-soft);\n      letter-spacing: 0.02em;\n    }\n    .doc-reg-drives-l {\n      font-weight: 600;\n      color: var(--c-ink);\n      margin-right: 6px;\n    }\n\n    /* ── CONDITIONS ────────────────────────────────────── */\n    .doc-conditions {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 12px;\n      margin: 14px 0 0;\n    }\n    @media (max-width: 880px) {\n      .doc-conditions { grid-template-columns: 1fr 1fr; }\n    }\n    @media (max-width: 520px) {\n      .doc-conditions { grid-template-columns: 1fr; }\n    }\n    .doc-cond {\n      padding: 14px 16px;\n      background: var(--c-paper);\n      border-radius: var(--r-md);\n      border-top: 3px solid var(--c-rule);\n      display: flex; flex-direction: column; gap: 8px;\n    }\n    .doc-cond-c0 { border-top-color: var(--c-ink-soft); }\n    .doc-cond-c1 { border-top-color: var(--c-terra); }\n \n    }\n    @media (max-width: 640px) {\n      .doc-hypo-note { margin-left: 0; }\n    }\n\n    /* ── REFERENCES ──────────────────────────────────────── */\n    .doc-refs-section { padding-bottom: 0; }\n    .doc-refs {\n      list-style: none;\n      padding: 0; margin: 0;\n      counter-reset: refn;\n    }\n    .doc-refs li {\n      counter-increment: refn;\n      padding: 12px 0 12px 32px;\n      border-bottom: 1px dashed var(--c-rule);\n      font-size: 13px; line-height: 1.6;\n      color: var(--c-ink);\n      position: relative;\n    }\n    .doc-refs li:last-child { border-bottom: 0; }\n    .doc-refs li::before {\n      content: counter(refn);\n      position: absolute; left: 0; top: 12px;\n      font: 600 10px/1 var(--f-mono);\n      letter-spacing: 0.08em;\n      color: var(--c-terra);\n      width: 24px;\n    }\n    .doc-refs em {\n      font: italic 13px/1.6 var(--f-display);\n      color: var(--c-ink);\n    }\n    .doc-refs code {\n      font-family: var(--f-mono); font-size: 11px;\n      background: var(--c-bg-2); padding: 1px 5px; border-radius: 3px;\n      color: var(--c-ink);\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n\n  <div id=\"root\"><\u002Fdiv>\n\n  <script src=\"30a881de-6cba-403e-a7dd-075dc5bb917f\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\u002Fscript>\n  <script src=\"2c246cfe-4078-427f-8024-b58e3397c594\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\u002Fscript>\n\n  <script src=\"acc56236-55e9-4339-af89-068172775822\"><\u002Fscript>\n  <script src=\"18fc6f53-2a7f-4090-b459-b5c0064dfa99\"><\u002Fscript>\n  <script src=\"e86d0636-b698-4241-9fc4-ebdd7fde39d3\"><\u002Fscript>\n  <script src=\"37d573bb-e97d-4a5d-ade3-9b4795610906\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
